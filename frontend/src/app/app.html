@if (showShell()) {
<div class="app-shell">
  <gems-side-menu [config]="menuConfig()" [appName]="appName" logoutLabel="Sair" logoutTitle="Encerrar sessão"
    [userName]="auth.username()" [userEmail]="auth.email()" [userInitials]="auth.initials()"
    (logoutClick)="onLogout()" />
  <main class="app-content"><router-outlet /></main>
</div>
} @else {
<router-outlet />
}
