spring:
  application:
    name: ${APP_NAME:sample}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sample-db}
    username: ${DB_USERNAME:sample-access}
    password: ${DB_PASSWORD:sample@2026.06.27!}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: ${DB_DEFAULT_SCHEMA:public}

  liquibase:
    change-log: ${LIQUIBASE_CHANGELOG:classpath:/db/changelog/changelog-master.xml}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8443/realms/sample-realm}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8443/realms/sample-realm/protocol/openid-connect/certs}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_EXPOSURE:health,info,metrics}
  endpoint:
    health:
      probes:
        enabled: true

# ---------------------------------------------------------------------------
# Configuração do Sample (namespace tipado — ver SampleKeycloakProperties)
# ---------------------------------------------------------------------------
sample:
  security:
    keycloak:
      server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8443}
      realm: ${KEYCLOAK_REALM:sample-realm}
      # Client confidencial usado nas operações administrativas (Admin API)
      client-id: ${KEYCLOAK_BACKEND_CLIENT_ID:sample-backend}
      client-secret: ${KEYCLOAK_BACKEND_CLIENT_SECRET:sample-backend-local-secret}

    # Origens liberadas para CORS (SPA Angular). Lista separada por vírgula.
    # Em produção, aponte para o domínio do frontend; nunca use "*" com credenciais.
    cors:
      allowed-origins: ${SAMPLE_CORS_ALLOWED_ORIGINS:http://localhost:4200}

gems:
  rest:
    correlation-id:
      header-name: ${CORRELATION_ID_HEADER:X-Correlation-Id}
      include-in-response: true

  exception:
    security:
      enabled: ${GEMS_EXCEPTION_SECURITY_ENABLED:true}

  jpa:
    # Ativa o JpaConfig do gems-sdk: @EnableJpaRepositories com repositoryBaseClass=BaseCustomJpaRepositoryImpl
    # e base-packages br.com.gems. Sem isto, os repositories do projeto não são detectados.
    enabled: ${GEMS_JPA_ENABLED:true}
    base-packages: ${GEMS_JPA_BASE_PACKAGES:br.com.gems}

  aws:
    region: ${AWS_REGION:us-east-1}
    endpoint: ${AWS_ENDPOINT:http://localhost:4566}
    s3:
      bucket-name: ${AWS_S3_BUCKET:sample-bucket}

  openapi:
    title: ${OPENAPI_TITLE:Sample API}
    version: ${OPENAPI_VERSION:1.0.0}
    description: ${OPENAPI_DESCRIPTION:API para o projeto Sample}

# ---------------------------------------------------------------------------
# AWS S3 (gems-aws lê do namespace raiz `aws.s3.*`). Aponta para o LocalStack local.
# access-key/secret-key ficam nulos (LocalStack aceita credenciais fake / path-style).
# ---------------------------------------------------------------------------
aws:
  s3:
    enabled: ${AWS_S3_ENABLED:true}
    region: ${AWS_REGION:us-east-1}
    endpoint-url: ${AWS_ENDPOINT:http://localhost:4566}
    bucket-name: ${AWS_S3_BUCKET:sample-bucket}
    access-key: ${AWS_ACCESS_KEY:test}
    secret-key: ${AWS_SECRET_KEY:test}
